<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>FazAí App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOGIN -->
  <div id="login">
    <div class="container">
      <div class="card">
        <h2>Login</h2>
        <input id="loginEmail" type="email" placeholder="Email" />
        <input id="loginSenha" type="password" placeholder="Senha" />
        <button onclick="login()">Entrar</button>
        <div id="loginErro" class="msg-erro"></div>

        <div class="links-row">
          <p class="link-text" onclick="mostrarCadastro()">Criar conta</p>
          <p class="link-text" onclick="mostrarEsqueciSenha()">
            Esqueci a senha
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- CADASTRO -->
  <div id="cadastro" class="hidden">
    <div class="container">
      <div class="card">
        <h2>Cadastro</h2>
        <input id="cadNome" type="text" placeholder="Nome" />
        <input id="cadEmail" type="email" placeholder="Email" />
        <input id="cadSenha" type="password" placeholder="Senha" />
        <button onclick="cadastrar()">Cadastrar</button>
        <div id="cadastroErro" class="msg-erro"></div>
        <p class="link-text" onclick="mostrarLogin()">Voltar</p>
      </div>
    </div>
  </div>

  <!-- ESQUECI A SENHA -->
  <div id="esqueciSenha" class="hidden">
    <div class="container">
      <div class="card">
        <h2>Redefinir senha</h2>

        <input id="esqueciEmail" type="email" placeholder="Email cadastrado" />
        <input
          id="esqueciNovaSenha"
          type="password"
          placeholder="Nova senha"
        />
        <input
          id="esqueciConfirmarSenha"
          type="password"
          placeholder="Confirmar nova senha"
        />

        <button onclick="redefinirSenha()">Salvar nova senha</button>
        <button onclick="mostrarLogin()">Voltar</button>

        <div id="esqueciSenhaErro" class="msg-erro"></div>
        <div id="esqueciSenhaSucesso" class="msg-sucesso"></div>
      </div>
    </div>
  </div>

  <!-- HOME -->
  <div id="home" class="hidden">
    <header>
      <div><strong>FazAí</strong></div>

      <div class="user-menu-wrapper">
        <div id="userMenuTrigger" class="user-menu-trigger"></div>

        <div id="userMenu" class="user-menu hidden">
          <button onclick="mostrarTelaAlterarSenha()">Alterar senha</button>
          <button onclick="logout()">Sair</button>
        </div>
      </div>
    </header>

    <div class="container">
      <div id="tarefas"></div>
    </div>

    <div class="fab" onclick="mostrarCriarTarefa()">+</div>
  </div>

  <!-- CRIAR TAREFA -->
  <div id="criarTarefa" class="hidden">
    <div class="container">
      <div class="card">
        <h2>Nova Tarefa</h2>

        <input id="titulo" placeholder="Título" />
        <textarea id="descricao" placeholder="Descrição"></textarea>

        <select id="prioridade">
          <option value="baixa">Baixa</option>
          <option value="media">Média</option>
          <option value="alta">Alta</option>
        </select>

        <label for="dataLimite" class="field-label">Data limite</label>
        <input id="dataLimite" type="date" />

        <button onclick="criarTarefa()">Salvar</button>
        <button onclick="voltarHome()">Voltar</button>

        <div id="tarefaErro" class="msg-erro"></div>
      </div>
    </div>
  </div>

  <!-- EDITAR TAREFA -->
  <div id="editarTarefa" class="hidden">
    <div class="container">
      <div class="card">
        <h2>Editar Tarefa</h2>

        <input id="editTitulo" placeholder="Título" />
        <textarea id="editDescricao" placeholder="Descrição"></textarea>

        <select id="editPrioridade">
          <option value="baixa">Baixa</option>
          <option value="media">Média</option>
          <option value="alta">Alta</option>
        </select>

        <label for="editDataLimite" class="field-label">Data limite</label>
        <input id="editDataLimite" type="date" />

        <button onclick="salvarEdicaoTarefa()">Salvar</button>
        <button onclick="voltarHomeDeEditar()">Voltar</button>

        <div id="erroEdicao" class="msg-erro"></div>
      </div>
    </div>
  </div>

  <!-- ALTERAR SENHA -->
  <div id="alterarSenha" class="hidden">
    <div class="container">
      <div class="card">
        <h2>Alterar senha</h2>

        <input id="senhaAtual" type="password" placeholder="Senha atual" />
        <input id="novaSenha" type="password" placeholder="Nova senha" />
        <input
          id="confirmarNovaSenha"
          type="password"
          placeholder="Confirmar nova senha"
        />

        <button onclick="salvarNovaSenha()">Salvar nova senha</button>
        <button onclick="voltarHomeDeAlterarSenha()">Voltar</button>

        <div id="alterarSenhaErro" class="msg-erro"></div>
        <div id="alterarSenhaSucesso" class="msg-sucesso"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
